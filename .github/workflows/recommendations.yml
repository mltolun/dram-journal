name: Weekly Whisky Recommendations

on:
  schedule:
    # Every Monday at 8:00 AM UTC
    - cron: '0 8 * * 1'
  # Allow manual trigger from the GitHub Actions tab for testing
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install @supabase/supabase-js

        # Run script from repo root so node_modules is found
        working-directory: ${{ github.workspace }}

      - name: Generate recommendations
        env:
          SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_KEY:           ${{ secrets.VITE_GEMINI_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM:           ${{ secrets.EMAIL_FROM }}
        run: node scripts/generate-recommendations.js
