name: Deploy Beta to GitHub Pages

on:
  push:
    branches: [beta]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build (beta base path)
        env:
          VITE_SUPABASE_URL:  ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY:  ${{ secrets.VITE_SUPABASE_KEY }}
          VITE_ADMIN_EMAILS:  ${{ secrets.VITE_ADMIN_EMAILS }}
          VITE_BASE_PATH:     /dram-journal-beta/
        run: npm run build

      - name: Deploy to dram-journal-beta repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          # Personal access token with repo scope
          # Add this as a secret named BETA_DEPLOY_TOKEN in your main repo
          personal_token: ${{ secrets.BETA_DEPLOY_TOKEN }}
          external_repository: YOUR_GITHUB_USERNAME/dram-journal-beta
          publish_branch: gh-pages
          publish_dir: dist
          commit_message: "Deploy beta from ${{ github.sha }}"
