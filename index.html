<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dram Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --amber: #C8822A;
    --amber-light: #E8A84C;
    --amber-pale: #F5E4C8;
    --peat: #2A1F14;
    --peat-mid: #4A3728;
    --peat-light: #7A6255;
    --oak: #8B6340;
    --cream: #FAF5EC;
    --cream-dark: #F0E6D0;
    --glass: rgba(250,245,236,0.06);
    --border: rgba(200,130,42,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--peat);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 1000;
  }

  /* ── HEADER ── */
  header {
    padding: 2.5rem 3rem 2rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--amber), transparent);
    opacity: 0.4;
  }

  .brand {
    font-family: 'Playfair Display', serif;
  }

  .brand-title {
    font-size: 2.2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--cream);
    line-height: 1;
  }

  .brand-title span {
    color: var(--amber-light);
    font-style: italic;
  }

  .brand-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--peat-light);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .header-stats {
    text-align: right;
    font-family: 'DM Mono', monospace;
  }

  .stat-count {
    font-size: 2.5rem;
    font-weight: 300;
    color: var(--amber-light);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--peat-light);
  }

  /* ── MAIN LAYOUT ── */
  .container {
    display: grid;
    grid-template-columns: 360px 1fr;
    min-height: calc(100vh - 130px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 0.5px solid var(--border);
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* ── FORM ── */
  .form-section {
    background: rgba(200,130,42,0.06);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }

  .form-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 1.2rem;
  }

  .form-row { margin-bottom: 1rem; }

  .form-row label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--peat-light);
    margin-bottom: 5px;
    font-family: 'DM Mono', monospace;
  }

  .form-row input, .form-row select, .form-row textarea {
    width: 100%;
    background: rgba(250,245,236,0.05);
    border: 0.5px solid rgba(200,130,42,0.25);
    border-radius: 6px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
    border-color: var(--amber);
  }

  .form-row select option { background: var(--peat-mid); }
  .form-row textarea { resize: vertical; min-height: 60px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

  /* Sliders */
  .slider-row { margin-bottom: 0.8rem; }
  .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .slider-label { font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--peat-light); font-family: 'DM Mono', monospace; }
  .slider-value { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--amber-light); }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    border-radius: 2px;
    background: rgba(200,130,42,0.2);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--amber);
    cursor: pointer;
    border: 2px solid var(--peat);
    transition: transform 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

  .btn-add {
    width: 100%;
    padding: 10px;
    background: var(--amber);
    color: var(--peat);
    border: none;
    border-radius: 7px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .btn-add:hover { background: var(--amber-light); transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  .btn-export {
    width: 100%;
    margin-top: 12px;
    padding: 8px 10px;
    background: transparent;
    color: var(--peat-light);
    border: 0.5px solid rgba(200,130,42,0.25);
    border-radius: 7px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-export:hover {
    border-color: var(--amber);
    color: var(--amber-light);
    background: rgba(200,130,42,0.06);
  }

  /* ── WHISKY LIST ── */
  .list-section { flex: 1; overflow-y: auto; }

  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .list-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
  }

  .compare-hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--peat-light);
  }

  .whisky-card {
    background: rgba(250,245,236,0.03);
    border: 0.5px solid rgba(200,130,42,0.15);
    border-radius: 9px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
  }

  .whisky-card:hover {
    background: rgba(200,130,42,0.08);
    border-color: rgba(200,130,42,0.35);
  }

  .whisky-card.selected {
    background: rgba(200,130,42,0.12);
    border-color: var(--amber);
  }

  .whisky-card.selected::before {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 60%;
    background: var(--amber);
    border-radius: 0 2px 2px 0;
  }

  .card-sel {
    width: 18px; height: 18px;
    border: 1px solid rgba(200,130,42,0.3);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-size: 10px;
    color: var(--amber);
  }

  .whisky-card.selected .card-sel {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--peat);
  }

  .card-info { flex: 1; min-width: 0; }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--peat-light);
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  .card-type {
    font-size: 0.6rem;
    padding: 2px 7px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .type-scotch { background: rgba(200,130,42,0.15); color: var(--amber-light); }
  .type-irish { background: rgba(50,170,100,0.12); color: #6ecb93; }
  .type-bourbon { background: rgba(180,80,80,0.12); color: #e08888; }
  .type-japanese { background: rgba(180,150,230,0.12); color: #c4aff0; }
  .type-other { background: rgba(150,150,150,0.12); color: #aaa; }

  .card-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--peat-light);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 5px;
    border-radius: 4px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .whisky-card:hover .card-delete { opacity: 0.5; }
  .card-delete:hover { opacity: 1 !important; color: #e08888; }

  /* ── MAIN PANEL ── */
  .main-panel {
    padding: 2rem 2.5rem;
    overflow-y: auto;
  }

  /* Empty state */
  .empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    opacity: 0.4;
  }

  .empty-glyph {
    font-size: 4rem;
    font-family: 'Playfair Display', serif;
    color: var(--amber);
    opacity: 0.3;
  }

  .empty-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--peat-light);
    text-align: center;
  }

  /* Compare bar */
  .compare-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border);
  }

  .compare-info {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--peat-light);
  }

  .compare-info span {
    color: var(--amber-light);
  }

  /* ── COMPARISON TABLE ── */
  .comp-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
    margin-bottom: 2.5rem;
  }

  .comp-table th {
    padding: 0 12px 10px;
    text-align: left;
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--peat-light);
    font-weight: 400;
    border-bottom: 0.5px solid var(--border);
  }

  .comp-table td {
    padding: 12px 12px;
    border-bottom: 0.5px solid rgba(200,130,42,0.08);
    vertical-align: top;
    color: var(--cream-dark);
  }

  .comp-table tr:hover td { background: rgba(200,130,42,0.04); }

  .comp-wname {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--cream);
  }

  .comp-origin {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--peat-light);
    margin-top: 2px;
  }

  .comp-row-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--peat-light);
    white-space: nowrap;
  }

  /* Profile bars */
  .profile-section {
    margin-top: 2rem;
  }

  .profile-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 1.5rem;
  }

  .profile-grid {
    display: grid;
    gap: 1.2rem;
  }

  .profile-attr { }

  .attr-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .attr-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--peat-light);
  }

  .attr-bars {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bar-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--peat-light);
    width: 130px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: right;
  }

  .bar-track {
    flex: 1;
    height: 4px;
    background: rgba(250,245,236,0.06);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(.23,1,.32,1);
  }

  .bar-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--peat-light);
    width: 20px;
    text-align: right;
  }

  /* Notes */
  .notes-section {
    margin-top: 2rem;
  }

  .notes-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 1rem;
  }

  .notes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .note-card {
    background: rgba(250,245,236,0.03);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .note-card-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--cream);
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 0.5px solid rgba(200,130,42,0.15);
  }

  .note-text {
    font-size: 0.78rem;
    color: var(--peat-light);
    line-height: 1.6;
    font-style: italic;
  }

  .no-notes { color: rgba(122,98,85,0.5); font-style: normal; }

  /* Toasts */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--peat-mid);
    border: 0.5px solid var(--amber);
    color: var(--cream);
    padding: 10px 18px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Color palette for whiskies */
  .c0 { background: #C8822A; }
  .c1 { background: #3B8BD4; }
  .c2 { background: #1D9E75; }
  .c3 { background: #7F77DD; }
  .c4 { background: #D4537E; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(200,130,42,0.2); border-radius: 2px; }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--peat-light);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
  }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 0.5px solid var(--border); }
    header { padding: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-title">The <span>Dram</span> Journal</div>
    <div class="brand-sub">Whisky tasting & comparison log</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
    <div class="header-stats">
      <div class="stat-count" id="total-count">0</div>
      <div class="stat-label">drams recorded</div>
    </div>
    <div id="sync-status" style="display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;color:var(--peat-light);">
      <span id="sync-dot" style="width:6px;height:6px;border-radius:50%;background:var(--peat-light);display:inline-block;transition:background 0.3s;"></span>
      <span id="sync-text">conectando...</span>
    </div>
  </div>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- ADD FORM -->
    <div class="form-section">
      <div class="form-title">— Añadir whisky</div>

      <div class="form-row">
        <label>Nombre</label>
        <input type="text" id="f-name" placeholder="Arran 10 Years Old">
      </div>

      <div class="form-grid">
        <div class="form-row">
          <label>Destilería</label>
          <input type="text" id="f-distillery" placeholder="Arran">
        </div>
        <div class="form-row">
          <label>Origen</label>
          <input type="text" id="f-origin" placeholder="Isla de Arran, Escocia">
        </div>
      </div>

      <div class="form-grid">
        <div class="form-row">
          <label>Tipo</label>
          <select id="f-type">
            <option value="scotch">Scotch</option>
            <option value="irish">Irish</option>
            <option value="bourbon">Bourbon</option>
            <option value="japanese">Japanese</option>
            <option value="other">Otro</option>
          </select>
        </div>
        <div class="form-row">
          <label>Maduración</label>
          <input type="text" id="f-age" placeholder="10 años / Bourbon">
        </div>
      </div>

      <div class="form-grid">
        <div class="form-row">
          <label>Precio (€)</label>
          <input type="text" id="f-price" placeholder="35–45 €">
        </div>
        <div class="form-row">
          <label>Fecha</label>
          <input type="date" id="f-date">
        </div>
      </div>

      <div style="margin: 1rem 0 0.5rem;">
        <div class="form-title" style="margin-bottom: 0.8rem;">— Perfil de sabor (0–10)</div>
        <div class="slider-row">
          <div class="slider-header">
            <span class="slider-label">Dulzor</span>
            <span class="slider-value" id="sv-dulzor">5</span>
          </div>
          <input type="range" min="0" max="10" step="0.5" value="5" id="sl-dulzor" oninput="document.getElementById('sv-dulzor').textContent=this.value">
        </div>
        <div class="slider-row">
          <div class="slider-header">
            <span class="slider-label">Ahumado</span>
            <span class="slider-value" id="sv-ahumado">2</span>
          </div>
          <input type="range" min="0" max="10" step="0.5" value="2" id="sl-ahumado" oninput="document.getElementById('sv-ahumado').textContent=this.value">
        </div>
        <div class="slider-row">
          <div class="slider-header">
            <span class="slider-label">Cuerpo</span>
            <span class="slider-value" id="sv-cuerpo">5</span>
          </div>
          <input type="range" min="0" max="10" step="0.5" value="5" id="sl-cuerpo" oninput="document.getElementById('sv-cuerpo').textContent=this.value">
        </div>
        <div class="slider-row">
          <div class="slider-header">
            <span class="slider-label">Frutado</span>
            <span class="slider-value" id="sv-frutado">5</span>
          </div>
          <input type="range" min="0" max="10" step="0.5" value="5" id="sl-frutado" oninput="document.getElementById('sv-frutado').textContent=this.value">
        </div>
        <div class="slider-row">
          <div class="slider-header">
            <span class="slider-label">Especiado</span>
            <span class="slider-value" id="sv-especiado">4</span>
          </div>
          <input type="range" min="0" max="10" step="0.5" value="4" id="sl-especiado" oninput="document.getElementById('sv-especiado').textContent=this.value">
        </div>
      </div>

      <div class="form-row">
        <label>Nariz</label>
        <input type="text" id="f-nose" placeholder="Vainilla, manzana verde...">
      </div>
      <div class="form-row">
        <label>Paladar</label>
        <input type="text" id="f-palate" placeholder="Malta dulce, especias...">
      </div>
      <div class="form-row">
        <label>Notas personales</label>
        <textarea id="f-notes" placeholder="Mis impresiones..."></textarea>
      </div>

      <button class="btn-add" onclick="addWhisky()">＋ Añadir al diario</button>
    </div>

    <!-- WHISKY LIST -->
    <div class="list-section">
      <div class="list-header">
        <span class="list-title">— Mi colección</span>
        <span class="compare-hint">hasta 4 para comparar</span>
      </div>
      <div id="whisky-list"></div>
      <button class="btn-export" onclick="exportCSV()" id="btn-export" style="display:none;">
        ↓ Exportar CSV
      </button>
    </div>

  </aside>

  <!-- MAIN PANEL -->
  <main class="main-panel" id="main-panel">
    <div class="empty-state" id="empty-state">
      <div class="empty-glyph">🥃</div>
      <div class="empty-text">Añade whiskies y selecciona<br>hasta 4 para comparar</div>
    </div>
    <div id="compare-content" style="display:none;"></div>
  </main>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Supabase config ─────────────────────────────────────────────
const SB_URL  = 'https://cjoqrhiqveythplughqx.supabase.co';
const SB_KEY  = 'sb_publishable_Udq4vXAPmVuu3jeTRdC4VA_ulfxYqKx';
const SB_HDRS = {
  'apikey':        SB_KEY,
  'Authorization': `Bearer ${SB_KEY}`,
  'Content-Type':  'application/json',
  'Prefer':        'return=representation'
};
const TABLE = `${SB_URL}/rest/v1/whiskies`;
// ───────────────────────────────────────────────────────────────

const COLORS    = ['c0','c1','c2','c3','c4'];
const COLOR_HEX = ['#C8822A','#3B8BD4','#1D9E75','#7F77DD','#D4537E'];

let whiskies = [];
let selected = [];

// ── Sync status indicator ──
function syncStatus(state) {
  const dot  = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  const states = {
    loading: { color: '#7A6255', label: 'cargando...' },
    saving:  { color: '#E8A84C', label: 'guardando...' },
    ok:      { color: '#1D9E75', label: 'sincronizado' },
    error:   { color: '#E24B4A', label: 'error de sync' },
  };
  const s = states[state] || states.ok;
  dot.style.background = s.color;
  text.textContent     = s.label;
}

// ── Load all rows from Supabase ──
async function loadFromSupabase() {
  syncStatus('loading');
  try {
    const res = await fetch(`${TABLE}?order=created_at.asc`, { headers: SB_HDRS });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    whiskies = await res.json();
    syncStatus('ok');
  } catch (e) {
    console.error('Supabase load error:', e);
    syncStatus('error');
    toast('⚠ No se pudo conectar con Supabase');
  }
  document.getElementById('total-count').textContent = whiskies.length;
  renderList();
  renderCompare();
}

// ── Insert new whisky ──
async function insertWhisky(w) {
  syncStatus('saving');
  try {
    const res = await fetch(TABLE, {
      method:  'POST',
      headers: SB_HDRS,
      body:    JSON.stringify(w)
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.message || res.status); }
    const rows = await res.json();
    syncStatus('ok');
    return rows[0];
  } catch (e) {
    console.error('Supabase insert error:', e);
    syncStatus('error');
    toast('⚠ Error al guardar: ' + e.message);
    return null;
  }
}

// ── Delete a whisky by id ──
async function deleteFromSupabase(id) {
  syncStatus('saving');
  try {
    const res = await fetch(`${TABLE}?id=eq.${id}`, {
      method:  'DELETE',
      headers: SB_HDRS
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    syncStatus('ok');
  } catch (e) {
    console.error('Supabase delete error:', e);
    syncStatus('error');
    toast('⚠ Error al eliminar');
  }
}

// ── Toast ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Add whisky ──
async function addWhisky() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('El nombre es obligatorio'); return; }

  const w = {
    id:         Date.now(),
    name,
    distillery: document.getElementById('f-distillery').value.trim(),
    origin:     document.getElementById('f-origin').value.trim(),
    type:       document.getElementById('f-type').value,
    age:        document.getElementById('f-age').value.trim(),
    price:      document.getElementById('f-price').value.trim(),
    date:       document.getElementById('f-date').value,
    nose:       document.getElementById('f-nose').value.trim(),
    palate:     document.getElementById('f-palate').value.trim(),
    notes:      document.getElementById('f-notes').value.trim(),
    dulzor:     parseFloat(document.getElementById('sl-dulzor').value),
    ahumado:    parseFloat(document.getElementById('sl-ahumado').value),
    cuerpo:     parseFloat(document.getElementById('sl-cuerpo').value),
    frutado:    parseFloat(document.getElementById('sl-frutado').value),
    especiado:  parseFloat(document.getElementById('sl-especiado').value),
  };

  const saved = await insertWhisky(w);
  if (!saved) return;

  whiskies.push(saved);
  document.getElementById('total-count').textContent = whiskies.length;
  renderList();
  renderCompare();
  toast('✓ ' + name + ' añadido');

  ['f-name','f-distillery','f-origin','f-age','f-price','f-nose','f-palate','f-notes'].forEach(id => document.getElementById(id).value = '');
  ['dulzor','ahumado','cuerpo','frutado','especiado'].forEach(attr => {
    const defaults = { dulzor:5, ahumado:2, cuerpo:5, frutado:5, especiado:4 };
    document.getElementById('sl-'+attr).value = defaults[attr];
    document.getElementById('sv-'+attr).textContent = defaults[attr];
  });
}

// ── Select / delete ──
function toggleSelect(id) {
  const idx = selected.indexOf(id);
  if (idx >= 0) { selected.splice(idx, 1); }
  else {
    if (selected.length >= 4) { toast('Máximo 4 whiskies para comparar'); return; }
    selected.push(id);
  }
  renderList();
  renderCompare();
}

async function deleteWhisky(id) {
  await deleteFromSupabase(id);
  whiskies = whiskies.filter(w => w.id !== id);
  selected = selected.filter(s => s !== id);
  document.getElementById('total-count').textContent = whiskies.length;
  renderList();
  renderCompare();
  toast('Eliminado');
}

function typeLabel(t) {
  const map = { scotch:'Scotch', irish:'Irish', bourbon:'Bourbon', japanese:'Japanese', other:'Otro' };
  return map[t] || t;
}

// ── Render list ──
function renderList() {
  const el = document.getElementById('whisky-list');
  const exportBtn = document.getElementById('btn-export');
  if (whiskies.length === 0) {
    el.innerHTML = '<div style="font-family:DM Mono,monospace;font-size:0.65rem;color:var(--peat-light);text-align:center;padding:1rem 0;letter-spacing:0.1em;">Sin whiskies aún</div>';
    exportBtn.style.display = 'none';
    return;
  }
  exportBtn.style.display = 'block';
  el.innerHTML = whiskies.map(w => {
    const isSel  = selected.includes(w.id);
    const selIdx = selected.indexOf(w.id);
    return `<div class="whisky-card ${isSel ? 'selected' : ''}" onclick="toggleSelect(${w.id})">
      <div class="card-sel" style="${isSel ? `background:${COLOR_HEX[selIdx]};border-color:${COLOR_HEX[selIdx]};` : ''}">
        ${isSel ? '✓' : ''}
      </div>
      <div class="card-info">
        <div class="card-name">${w.name}</div>
        <div class="card-meta">${w.origin || w.distillery || '—'}</div>
      </div>
      <span class="card-type type-${w.type}">${typeLabel(w.type)}</span>
      <button class="card-delete" onclick="event.stopPropagation();deleteWhisky(${w.id})" title="Eliminar">✕</button>
    </div>`;
  }).join('');
}

// ── Render compare ──
function renderCompare() {
  const panel = document.getElementById('compare-content');
  const empty = document.getElementById('empty-state');

  if (selected.length === 0) {
    panel.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }

  empty.style.display = 'none';
  panel.style.display = 'block';

  const ws = selected.map(id => whiskies.find(w => w.id === id)).filter(Boolean);

  const legend = ws.map((w, i) => `
    <div class="legend-item">
      <div class="legend-dot ${COLORS[i]}"></div>
      <span>${w.name}</span>
    </div>`).join('');

  const fields = [
    { label: 'Destilería', key: 'distillery' },
    { label: 'Origen',     key: 'origin' },
    { label: 'Tipo',       key: 'type', render: typeLabel },
    { label: 'Maduración', key: 'age' },
    { label: 'Precio',     key: 'price' },
    { label: 'Nariz',      key: 'nose' },
    { label: 'Paladar',    key: 'palate' },
  ];

  const tableRows    = fields.map(f => `
    <tr>
      <td class="comp-row-label">${f.label}</td>
      ${ws.map(w => `<td>${(f.render ? f.render(w[f.key]) : w[f.key]) || '<span style="color:var(--peat-light);opacity:.4">—</span>'}</td>`).join('')}
    </tr>`).join('');
  const tableHeaders = `<th></th>${ws.map((w,i) => `<th><span style="color:${COLOR_HEX[i]}">●</span> ${w.name}</th>`).join('')}`;

  const attrs      = ['dulzor','ahumado','cuerpo','frutado','especiado'];
  const attrLabels = { dulzor:'Dulzor', ahumado:'Ahumado', cuerpo:'Cuerpo', frutado:'Frutado', especiado:'Especiado' };

  const profileBars = attrs.map(attr => `
    <div class="profile-attr">
      <div class="attr-header"><span class="attr-label">${attrLabels[attr]}</span></div>
      <div class="attr-bars">
        ${ws.map((w,i) => `
          <div class="bar-row">
            <div class="bar-label">${w.name}</div>
            <div class="bar-track"><div class="bar-fill ${COLORS[i]}" style="width:${w[attr]*10}%"></div></div>
            <div class="bar-num">${w[attr]}</div>
          </div>`).join('')}
      </div>
    </div>`).join('');

  const notesCards = ws.map((w,i) => `
    <div class="note-card">
      <div class="note-card-name" style="color:${COLOR_HEX[i]}">${w.name}</div>
      <div class="note-text ${w.notes ? '' : 'no-notes'}">${w.notes || 'Sin notas personales'}</div>
    </div>`).join('');

  panel.innerHTML = `
    <div class="compare-bar">
      <div class="legend">${legend}</div>
      <div class="compare-info">Comparando <span>${ws.length}</span> de 4 seleccionados</div>
    </div>
    <table class="comp-table">
      <thead><tr>${tableHeaders}</tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    <div class="profile-section">
      <div class="profile-title">— Perfil de sabor</div>
      <div class="profile-grid">${profileBars}</div>
    </div>
    <div class="notes-section">
      <div class="notes-title">— Notas personales</div>
      <div class="notes-grid">${notesCards}</div>
    </div>`;
}

// ── Export CSV ──
function exportCSV() {
  if (whiskies.length === 0) { toast('No hay whiskies para exportar'); return; }
  const headers = ['Nombre','Destilería','Origen','Tipo','Maduración','Precio','Fecha','Nariz','Paladar','Notas','Dulzor','Ahumado','Cuerpo','Frutado','Especiado'];
  const escape  = v => { const s = (v==null)?'':String(v); return (s.includes(',')||s.includes('"')||s.includes('\n')) ? '"'+s.replace(/"/g,'""')+'"' : s; };
  const rows    = whiskies.map(w => [w.name,w.distillery,w.origin,w.type,w.age,w.price,w.date,w.nose,w.palate,w.notes,w.dulzor,w.ahumado,w.cuerpo,w.frutado,w.especiado].map(escape).join(','));
  const csv     = [headers.join(','),...rows].join('\r\n');
  const blob    = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url     = URL.createObjectURL(blob);
  const a       = document.createElement('a');
  a.href = url; a.download = 'dram-journal-'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('✓ CSV exportado — '+whiskies.length+' whiskies');
}

// ── Init ──
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
loadFromSupabase();
</script>
</body>
</html>
